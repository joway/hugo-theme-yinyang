<script>
  // remove disqus ads
  document.addEventListener("DOMContentLoaded", function() {
    const disqus = document.getElementById('disqus_thread');
    if (!disqus) {
      return;
    }
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        const iframes = disqus.getElementsByTagName('iframe');
        if (iframes.length > 1) {
          const commentsIframe = iframes[1];
          while (disqus.firstChild) {
            disqus.removeChild(disqus.firstChild);
          }
          disqus.appendChild(commentsIframe);
          observer.disconnect();
        }
      });
    });
    observer.observe(disqus, { childList: true, subtree: true });
  });
</script>


{{ $showCopyButton := .Params.enableCopyCode | default .Site.Params.enableCopyCode | default false }}
{{ if $showCopyButton }}
<script>
document.addEventListener('click', e => {
  const button = e.target.closest('.copy-code-btn');
  if (!button) return;

  const text = button.parentElement.querySelector('code')?.textContent;
  if (!text) return;

  navigator.clipboard.writeText(text).then(() => {
    button.textContent = 'Copied!';
    button.classList.add('copied');

    setTimeout(() => {
      button.textContent = 'Copy';
      button.classList.remove('copied');
    }, 2000);
  });
});

document.querySelectorAll('.markdown-body pre').forEach(pre => {
  const button = document.createElement('button');
  button.className = 'copy-code-btn';
  button.textContent = 'Copy';
  pre.append(button);
});
</script>
{{ end }}
